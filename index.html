<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/CSS/index.css">
    <link rel="stylesheet" href="./assets/CSS/style.css">
    <title>Connexion</title>
</head>

<body>
    <div class="barre"></div>
    <section class="log">
        <div class="login-card">

            <div class="login-image">
                <img src="./assets/Images/connect.svg" alt="image">
            </div>

            <div class="login-form">
                <h1 class="title">Connexion à Blue Ocean</h1>

                <div class="group">
                    <label for="email">Email</label>
                    <div class="input">
                        <input type="email" id="email" placeholder="abc@example.com" autocomplete="email" />
                    </div>

                    <label for="password">Mot de passe</label>
                    <div class="input">
                        <input type="password" id="password" placeholder="••••••" autocomplete="current-password" />
                    </div>
                </div>

                <div class="forgot">
                    <a href="#">Mot de passe oublié ?</a>
                </div>

                <button class="btn" type="button">Connexion</button>

                <div class="divider">
                    <span>ou avec</span>
                </div>

                <div class="social-buttons">

                    <button class="social-btn">
                        <img src="./assets/Images/google.svg" alt="image">
                    </button>

                    
                    <button class="social-btn">
                        <img src="./assets/Images/facebook .svg" alt="image">
                    </button>

                    
                    <button class="social-btn">
                        <img src="./assets/Images/github.svg" alt="image">
                    </button>
                </div>
            </div>

        </div>
    </section>

</body>
J
</html>
